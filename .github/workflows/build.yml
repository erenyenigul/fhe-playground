name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lake build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Print Lean version
        run: lean --version

      # Cache Mathlib build artifacts — dramatically reduces CI time
      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Update Lake manifest
        run: lake update

      - name: Download Mathlib build cache
        run: lake exe cache get || true
        # `|| true` so a cache miss does not fail CI; lake build falls back to local compilation

      - name: Build
        run: lake build

      # Fail if any new `sorry` is introduced (optional but recommended)
      - name: Check for unresolved sorrys
        run: |
          SORRY_COUNT=$(grep -r --include="*.lean" "sorry" FhePlayground/ | \
            grep -v "^.*--.*sorry" | wc -l)
          echo "Unresolved sorry count: $SORRY_COUNT"
          # Remove the `exit 0` below and replace with `exit 1` once the project
          # is ready to enforce a sorry-free build.
          exit 0
